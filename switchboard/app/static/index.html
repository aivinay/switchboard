<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Switchboard</title>
    <link rel="stylesheet" href="/ui/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="topbar-left">
          <div class="model-picker">
            <button
              id="model-picker-button"
              class="model-picker-button"
              type="button"
              aria-haspopup="listbox"
              aria-expanded="false"
            >
              <span id="selected-model">Auto</span>
              <span class="chevron" aria-hidden="true">⌄</span>
            </button>
            <span id="model-lock-note" class="model-lock-note" hidden>Private chat forces Local</span>
            <div id="model-menu" class="model-menu" role="listbox" aria-label="Model" hidden></div>
          </div>
          <div id="quota-meters" class="quota-meters" hidden></div>
          <button
            id="privacy-floor"
            class="privacy-floor"
            type="button"
            aria-expanded="false"
            aria-describedby="privacy-floor-popover"
          >
            <span aria-hidden="true">🛡</span>
            <span>Privacy floor: always on</span>
          </button>
          <div id="privacy-floor-popover" class="privacy-popover" hidden>
            Prompts containing personal or secret content never leave this machine, even when
            premium backends are selected. This cannot be turned off.
          </div>
        </div>
        <h1>Switchboard</h1>
        <div class="topbar-actions">
          <button id="dashboard-toggle" class="topbar-button" type="button" aria-expanded="false">
            Savings
          </button>
          <button id="new-chat" class="topbar-button" type="button" title="Start a new chat">
            + New chat
          </button>
        </div>
      </header>

      <section id="dashboard" class="dashboard" hidden>
        <div class="dashboard-grid">
          <div>
            <span class="metric-label">Premium avoided</span>
            <strong id="metric-premium-avoided">0</strong>
          </div>
          <div>
            <span class="metric-label">Tokens saved</span>
            <strong id="metric-tokens-saved">0</strong>
          </div>
          <div>
            <span class="metric-label">Premium calls</span>
            <strong id="metric-premium-calls">0</strong>
          </div>
        </div>
        <div id="backend-usage" class="backend-usage"></div>
        <div id="trend" class="trend" aria-label="Last 7 days"></div>
      </section>

      <section id="messages" class="messages" aria-live="polite"></section>

      <form id="chat-form" class="composer">
        <textarea
          id="message"
          rows="1"
          placeholder="Ask Switchboard..."
          autocomplete="off"
          aria-label="Message"
        ></textarea>
        <div class="composer-footer">
          <button
            id="private-chat-toggle"
            class="private-chat-toggle"
            type="button"
            aria-pressed="false"
          >
            <span aria-hidden="true">🔒</span>
            <span>Private chat</span>
          </button>
          <button id="send" class="send-button" type="submit" aria-label="Send message" disabled>
            <span aria-hidden="true">↑</span>
          </button>
        </div>
      </form>
    </main>
    <script src="/ui/static/state.js" defer></script>
    <script src="/ui/static/overlays.js" defer></script>
    <script src="/ui/static/app.js" defer></script>
  </body>
</html>
